<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel ="stylesheet" href="style.css">

</head>
<body class="bg-[url('src/Log_Background.jpg')] bg-center bg-cover grid justify-center items-center min-h-screen">
        
    <div class="bg-[#3A3541DE]/90 h-130 w-100 rounded-xl flex flex-col items-center gap-5">
        
        <img src="./src/logo-clear.png" class="w-50 mt-5" alt="">
        
        <div class="flex flex-col items-center">

            <h3 class="font-bold font-serif text-white">Masuk</h3>
        
            <p class=" text-white mt-2">Selamat Datang Kembali!!</p>
        </div>

        <div class="w-80 flex flex-col gap-2 text-white">
            
            <p>Username</p>

            <input class="rounded-xl border border-[#E7E3FCDE] px-5 focus:outline-none  " type="" placeholder="Masukkan Username">
        
        </div>

        <div class="w-80 flex flex-col gap-2 text-white justify-between">
            
            <p>Password</p>

            <input class="rounded-xl border border-[#E7E3FCDE] px-5 focus:outline-none " type="" placeholder="Masukkan Password">
            
            <div class="flex justify-between">

            <p class="text-[#E7E3FCAD]">Belum punya akun? <a href="./registration.html" class="text-[#E7E3FCDE]"> Daftar</a></p>

            <a href="" class="text-[#E7E3FCDE]">Lupa kata Sandi?</a>

            </div>

            <div class="flex flex-col text-center gap-2 mt-5">

                <button class="border b-5 rounded-xl border-[#E7E3FCDE] hover:bg-[#887d9661]">Masuk</button>
                
                <p>Atau</p>

                <button class="text- border b-5 rounded-xl gap-3 border-[#E7E3FCDE] hover:bg-[#887d9661] flex flex-row items-center justify-center">
                    
                    <img src="./src/google-logo.png" class="object-cover h-5 w-5 " alt="">Masuk Dengan Google</button>


            </div>
            
        
        </div>



        


    </div>
    
</body>
</html>
